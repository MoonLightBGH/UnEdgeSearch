<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>无极后端管理</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #18202a;
      --muted: #6c7480;
      --line: #e8ebf0;
      --primary: #111111;
      --danger: #c93535;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", sans-serif;
    }
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 18px 40px;
    }
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 22px;
    }
    h1 { margin: 0; font-size: 34px; }
    .hero p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 18px;
    }
    .card {
      background: var(--card);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 26px rgba(18, 32, 50, 0.08);
      border: 1px solid var(--line);
    }
    .card h2 {
      margin: 0 0 16px;
      font-size: 22px;
    }
    .status-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .pill {
      padding: 14px 16px;
      border-radius: 14px;
      background: #f7f9fc;
      border: 1px solid var(--line);
    }
    .pill .label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .pill .value {
      display: block;
      font-size: 18px;
      font-weight: 700;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }
    button {
      min-height: 42px;
      border: none;
      border-radius: 999px;
      padding: 0 18px;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }
    button.secondary {
      background: #eef2f7;
      color: var(--text);
    }
    button.danger {
      background: #fff1f1;
      color: var(--danger);
    }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      margin-bottom: 12px;
      background: #fff;
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    .list {
      max-height: 540px;
      overflow: auto;
    }
    .item {
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }
    .item:last-child { border-bottom: none; }
    .item-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .item-title {
      margin: 0;
      font-size: 17px;
      line-height: 1.6;
    }
    .meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }
    .desc {
      margin-top: 10px;
      line-height: 1.8;
      color: #2b3440;
      font-size: 14px;
      white-space: pre-wrap;
    }
    .log {
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div>
        <h1>无极后端管理</h1>
        <p>新闻、视频、小说和搜索记录都在这里统一管理。</p>
      </div>
    </div>

    <div class="grid">
      <section class="card">
        <h2>新闻同步</h2>
        <div class="status-row">
          <div class="pill"><span class="label">运行状态</span><span class="value" id="syncRunning">待检查</span></div>
          <div class="pill"><span class="label">最近新增</span><span class="value" id="syncInserted">0</span></div>
          <div class="pill"><span class="label">最近失败</span><span class="value" id="syncFailed">0</span></div>
          <div class="pill"><span class="label">最近完成</span><span class="value" id="syncFinished">暂无</span></div>
        </div>
        <div class="toolbar">
          <button onclick="syncNews()">立即同步</button>
          <button class="secondary" onclick="loadNews()">刷新列表</button>
          <button class="danger" onclick="clearNowNews()">清空时事新闻</button>
        </div>
        <div class="log" id="syncLog">准备就绪</div>
      </section>

      <section class="card">
        <h2>手动发布新闻</h2>
        <input id="n_title" placeholder="标题" />
        <textarea id="n_desc" placeholder="内容"></textarea>
        <select id="n_type">
          <option value="now">时事新闻</option>
          <option value="history">历史新闻</option>
        </select>
        <button onclick="addNews()">发布新闻</button>
      </section>

      <section class="card">
        <h2>新闻列表</h2>
        <div class="list" id="newsList"></div>
      </section>

      <section class="card">
        <h2>视频管理</h2>
        <input id="v_title" placeholder="标题" />
        <textarea id="v_desc" placeholder="描述"></textarea>
        <input id="v_type" placeholder="分类，例如：推荐 / 健康 / 小说" />
        <button onclick="addVideo()">发布视频</button>
        <div class="list" id="videoList" style="margin-top: 16px;"></div>
      </section>

      <section class="card">
        <h2>小说管理</h2>
        <div class="toolbar">
          <button onclick="syncNovels()">同步短篇小说</button>
          <button class="secondary" onclick="loadNovels()">刷新列表</button>
          <button class="danger" onclick="clearNovels()">清空小说</button>
        </div>
        <input id="x_title" placeholder="小说标题" />
        <input id="x_source" placeholder="来源，例如：手动发布 / AI生成" />
        <textarea id="x_desc" placeholder="简介"></textarea>
        <textarea id="x_content" placeholder="正文内容，建议发短篇小说"></textarea>
        <button onclick="addNovel()">发布小说</button>
        <div class="list" id="novelList" style="margin-top: 16px;"></div>
      </section>

      <section class="card">
        <h2>系统设置</h2>
        <div class="status-row">
          <div class="pill">
            <span class="label">AI总结</span>
            <span class="value" id="aiSummaryState">待检查</span>
          </div>
          <div class="pill">
            <span class="label">已连接设备</span>
            <span class="value" id="deviceCount">0</span>
          </div>
        </div>
        <div class="toolbar">
          <button id="toggleAiButton" onclick="toggleAiSummary()">切换 AI 总结</button>
          <button class="secondary" onclick="loadSettings()">刷新设置</button>
          <button class="secondary" onclick="loadDevices()">刷新设备</button>
        </div>
        <div class="log" id="settingsLog">系统设置准备就绪</div>
      </section>

      <section class="card">
        <h2>连接设备</h2>
        <div class="list" id="deviceList"></div>
      </section>

      <section class="card">
        <h2>搜索记录</h2>
        <div class="list" id="historyList"></div>
      </section>
    </div>
  </div>

  <script>
    const API = location.origin

    function setLog(message) {
      document.getElementById('syncLog').textContent = message
    }

    async function request(path, options = {}) {
      const response = await fetch(API + path, options)
      const data = await response.json()
      if (!response.ok) throw new Error(data.error || '请求失败')
      return data
    }

    async function loadSyncStatus() {
      const data = await request('/api/news/sync-status')
      document.getElementById('syncRunning').textContent = data.running ? '同步中' : '空闲'
      document.getElementById('syncInserted').textContent = data.inserted || 0
      document.getElementById('syncFailed').textContent = data.failed || 0
      document.getElementById('syncFinished').textContent = data.finishedAt || '暂无'
    }

    async function loadNews() {
      const data = await request('/api/news')
      const root = document.getElementById('newsList')
      root.innerHTML = data.map(item => `
        <div class="item">
          <div class="item-head">
            <div>
              <p class="item-title">${item.title}</p>
              <div class="meta">${item.type} · ${item.time || '暂无时间'}</div>
            </div>
            <button class="danger" onclick="deleteNews(${item.id})">删除</button>
          </div>
          <div class="desc">${item.desc || ''}</div>
        </div>
      `).join('') || '<div class="meta">暂无新闻数据</div>'
    }

    async function addNews() {
      await request('/api/news', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title: document.getElementById('n_title').value,
          desc: document.getElementById('n_desc').value,
          type: document.getElementById('n_type').value
        })
      })
      setLog('手动新闻发布成功')
      loadNews()
    }

    async function deleteNews(id) {
      await request('/api/news/' + id, { method: 'DELETE' })
      setLog('新闻已删除')
      loadNews()
    }

    async function clearNowNews() {
      await request('/api/news?type=now', { method: 'DELETE' })
      setLog('时事新闻已清空')
      loadNews()
    }

    async function syncNews() {
      setLog('正在同步新闻，请稍等...')
      const data = await request('/api/news/sync', { method: 'POST' })
      setLog(`同步完成：新增 ${data.inserted || 0} 条，失败 ${data.failed || 0} 条`)
      loadSyncStatus()
      loadNews()
    }

    async function loadVideos() {
      const data = await request('/api/videos')
      const root = document.getElementById('videoList')
      root.innerHTML = data.map(item => `
        <div class="item">
          <div class="item-head">
            <div>
              <p class="item-title">${item.title}</p>
              <div class="meta">${item.type || '未分类'} · ${item.source || '视频源'}</div>
            </div>
            <button class="danger" onclick="deleteVideo(${item.id})">删除</button>
          </div>
          <div class="desc">${item.desc || ''}</div>
        </div>
      `).join('') || '<div class="meta">暂无视频数据</div>'
    }

    async function addVideo() {
      await request('/api/videos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title: document.getElementById('v_title').value,
          desc: document.getElementById('v_desc').value,
          type: document.getElementById('v_type').value || '推荐'
        })
      })
      loadVideos()
    }

    async function deleteVideo(id) {
      await request('/api/videos/' + id, { method: 'DELETE' })
      loadVideos()
    }

    async function loadNovels() {
      const data = await request('/api/novels')
      const root = document.getElementById('novelList')
      root.innerHTML = data.map(item => `
        <div class="item">
          <div class="item-head">
            <div>
              <p class="item-title">${item.title}</p>
              <div class="meta">${item.source || '手动发布'} · ${item.time || '暂无时间'}</div>
            </div>
            <button class="danger" onclick="deleteNovel(${item.id})">删除</button>
          </div>
          <div class="desc">${item.desc || ''}</div>
        </div>
      `).join('') || '<div class="meta">暂无小说数据</div>'
    }

    async function addNovel() {
      await request('/api/novels', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title: document.getElementById('x_title').value,
          source: document.getElementById('x_source').value || '手动发布',
          desc: document.getElementById('x_desc').value,
          content: document.getElementById('x_content').value
        })
      })
      setLog('小说发布成功')
      loadNovels()
    }

    async function deleteNovel(id) {
      await request('/api/novels/' + id, { method: 'DELETE' })
      setLog('小说已删除')
      loadNovels()
    }

    async function clearNovels() {
      await request('/api/novels', { method: 'DELETE' })
      setLog('小说已清空')
      loadNovels()
    }

    async function syncNovels() {
      setLog('正在同步短篇小说，请稍等...')
      const data = await request('/api/novels/sync', { method: 'POST' })
      setLog(`小说同步完成：新增 ${data.inserted || 0} 篇`)
      loadNovels()
    }

    async function loadHistory() {
      const data = await request('/api/search/history')
      const root = document.getElementById('historyList')
      root.innerHTML = data.map(item => `
        <div class="item">
          <div class="item-head">
            <div>
              <p class="item-title">${item.keyword}</p>
              <div class="meta">${item.created_at || '暂无时间'}</div>
            </div>
            <button class="danger" onclick="deleteHistory(${item.id})">删除</button>
          </div>
          <div class="desc">${item.summary || ''}</div>
        </div>
      `).join('') || '<div class="meta">暂无搜索记录</div>'
    }

    async function deleteHistory(id) {
      await request('/api/search/history/' + id, { method: 'DELETE' })
      loadHistory()
    }

    async function loadSettings() {
      const data = await request('/api/admin/settings')
      document.getElementById('aiSummaryState').textContent = data.aiSummaryEnabled ? '已开启' : '已关闭'
      document.getElementById('toggleAiButton').textContent = data.aiSummaryEnabled ? '关闭 AI 总结' : '开启 AI 总结'
      document.getElementById('settingsLog').textContent = `当前 AI 总结：${data.aiSummaryEnabled ? '开启' : '关闭'}`
    }

    async function toggleAiSummary() {
      const currentEnabled = document.getElementById('aiSummaryState').textContent === '已开启'
      const data = await request('/api/admin/settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          aiSummaryEnabled: !currentEnabled
        })
      })
      document.getElementById('settingsLog').textContent = `AI 总结已${data.aiSummaryEnabled ? '开启' : '关闭'}`
      loadSettings()
    }

    async function loadDevices() {
      const data = await request('/api/admin/devices')
      document.getElementById('deviceCount').textContent = data.filter(item => item.status === 'connected').length
      const root = document.getElementById('deviceList')
      root.innerHTML = data.map(item => `
        <div class="item">
          <div class="item-head">
            <div>
              <p class="item-title">${item.device_name || '未命名设备'}</p>
              <div class="meta">设备ID：${item.device_id}</div>
              <div class="meta">状态：${item.status === 'connected' ? '已连接' : '已断开'} · 最近心跳：${item.last_seen_at || '暂无'}</div>
              <div class="meta">服务器：${item.server_url || '未上报'}</div>
            </div>
            <button class="danger" onclick='disconnectDevice(${JSON.stringify(item.device_id)})'>断开连接</button>
          </div>
        </div>
      `).join('') || '<div class="meta">暂无设备连接记录</div>'
    }

    async function disconnectDevice(deviceId) {
      await request('/api/admin/devices/' + encodeURIComponent(deviceId) + '/disconnect', { method: 'POST' })
      document.getElementById('settingsLog').textContent = '设备已断开连接'
      loadDevices()
    }

    async function bootstrap() {
      try {
        await Promise.all([loadSyncStatus(), loadNews(), loadVideos(), loadNovels(), loadHistory(), loadSettings(), loadDevices()])
      } catch (error) {
        setLog(error.message)
      }
    }

    bootstrap()
  </script>
</body>
</html>
